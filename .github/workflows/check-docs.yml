name: Check docs

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

jobs:
  check-docs:
    name: Structure parity & link check
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9
          run_install: false

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Check structure parity
        run: pnpm run check:parity

      - name: Check internal links
        run: pnpm run check:links
